# "1" if auth disabled OR a valid viewer cookie is present, else "0"
js_set $session_valid auth.validate;
# "1" only if a valid short-lived stream_token cookie is present (always required for /hls/,
# regardless of auth_enabled — stops a leaked/copied .m3u8/.ts URL from working once it goes stale)
js_set $stream_valid auth.validateStream;

# $livetv_acl_allowed comes from the geo map in /etc/nginx/conf.d/livetv-acl.conf
# (admin-managed IP allowlist, regenerated by admin.py). "1" = allowed.
error_page 403 /forbidden.html;

# ---- Access-denied page (exact match bypasses the ACL check in location /) ----
location = /forbidden.html {
    root /var/www/livetv;
}

# ---- Admin/control backend (Python) ----
location /api/ {
    proxy_pass http://127.0.0.1:8088;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_http_version 1.1;
}

# ---- Admin panel (static; API enforces admin auth; outside the IP ACL) ----
location /admin {
    alias /var/www/admin/;
    index index.html;
    try_files $uri $uri/ /var/www/admin/index.html;
}

# ---- Channel logos (public) ----
location /logos/ {
    root /var/www;
    add_header Cache-Control "max-age=3600";
}

# ---- Protected: HLS playlists ----
location ~* ^/hls/.+\.m3u8$ {
    if ($livetv_acl_allowed = 0) { return 403; }
    if ($session_valid != "1") { return 403; }
    if ($stream_valid != "1") { return 403; }
    root /var/www;
    default_type application/vnd.apple.mpegurl;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Access-Control-Allow-Origin *;
}

# ---- Protected: HLS segments ----
location ~* ^/hls/.+\.ts$ {
    if ($livetv_acl_allowed = 0) { return 403; }
    if ($session_valid != "1") { return 403; }
    if ($stream_valid != "1") { return 403; }
    root /var/www;
    default_type video/mp2t;
    add_header Cache-Control "max-age=10";
    add_header Access-Control-Allow-Origin *;
}

# ---- Status (public) ----
location = /status {
    default_type application/json;
    return 200 '{"status":"running"}';
}

# ---- Web player (public page; gated by IP ACL) ----
location / {
    if ($livetv_acl_allowed = 0) { return 403; }
    root /var/www/livetv;
    index index.html;
    try_files $uri $uri/ =404;
}
