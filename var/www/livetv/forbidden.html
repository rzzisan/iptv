<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live TV — অ্যাক্সেস নেই</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #fff;
    font-family: Arial, 'Hind Siliguri', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .card {
    background: #161616;
    padding: 40px 30px;
    border-radius: 12px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    text-align: center;
  }
  .ic { font-size: 2.6rem; margin-bottom: 10px; }
  h1 { font-size: 1.25rem; margin-bottom: 10px; color: #f0f0f0; }
  p { font-size: 0.9rem; color: #aaa; line-height: 1.6; }
</style>
</head>
<body>
  <div class="card">
    <div class="ic">🚫</div>
    <h1>দুঃখিত, আপনার অ্যাক্সেস নেই</h1>
    <p>আপনার নেটওয়ার্ক থেকে এই লাইভ টিভি সার্ভিস দেখার অনুমতি নেই।<br>অ্যাক্সেসের প্রয়োজন হলে অ্যাডমিনের সাথে যোগাযোগ করুন।</p>
  </div>
</body>
</html>
